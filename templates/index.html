<!DOCTYPE html>
<html>
<head>
    <title>CRM PRO</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 40%;
        }

        button {
            padding: 10px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        .cliente {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .delete {
            color: red;
            cursor: pointer;
        }
    </style>

</head>
<body>

<div class="container">

<h1>CRM PRO</h1>

<h3>Aggiungi cliente</h3>

<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<button onclick="addCliente()">Aggiungi</button>

<hr>

<h3>Clienti</h3>

<div id="lista">
    <ul>
    {% for c in clienti %}
        <li>
            {{ c.nome }} - {{ c.email }}
        </li>
    {% endfor %}
    </ul>
</div>

</div>

<script>

async function addCliente() {
    let nome = document.getElementById("nome").value;
    let email = document.getElementById("email").value;

    await fetch(`/add?nome=${nome}&email=${email}`);
    location.reload();
}

async function deleteCliente(index) {
    await fetch(`/delete/${index}`);
    location.reload();
}

</script>

</body>
</html>
