<!DOCTYPE html>
<html>

<head>
<title>CRM</title>
</head>

<body>

<h2>Clienti</h2>

<table border="1">
<tr>
<th>Nome</th>
<th>Email</th>
<th>Telefono</th>
</tr>

{% for c in clienti %}

<tr>
<td>{{c.nome}}</td>
<td>{{c.email}}</td>
<td>{{c.telefono}}</td>
</tr>

{% endfor %}

</table>

<h3>Aggiungi cliente</h3>

<form action="/add" method="post">

<input name="nome" placeholder="Nome">
<input name="email" placeholder="Email">
<input name="telefono" placeholder="Telefono">

<button type="submit">Aggiungi</button>

</form>

</body>
</html>
