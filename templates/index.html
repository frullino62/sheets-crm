<!DOCTYPE html>
<html>
<head>
    <title>CRM Clienti</title>
</head>
<body>

<h1>CRM Clienti</h1>

<form action="/add" method="get">
    <input name="nome" placeholder="Nome">
    <input name="email" placeholder="Email">
    <button type="submit">Aggiungi</button>
</form>

<ul>
{% for c in clienti %}
    <li>
        {{ c["nome"] }} - {{ c["email"] }}
        <a href="/delete/{{ loop.index0 }}">❌</a>
    </li>
{% endfor %}
</ul>

</body>
</html>
